<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo de Anime - Elige tu Favorito</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tournament-wrapper {
            background: #0f3460;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #16213e;
        }

        .round-title {
            text-align: center;
            font-size: 1.5em;
            color: #e94560;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .matchup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .anime-card {
            flex: 1;
            max-width: 300px;
            background: #16213e;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            border-color: #533483;
        }

        .anime-card.selected {
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .anime-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e94560;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .anime-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            background-color: #333;
        }

        .anime-image.loading {
            background: linear-gradient(90deg, #333 25%, #444 50%, #333 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .anime-name {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            background: rgba(0,0,0,0.5);
        }

        .vs {
            font-size: 2.5em;
            font-weight: 900;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-next {
            background: #e94560;
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            background: #ff4d6d;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
            transform: scale(1.05);
        }

        .btn-next:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-reset {
            background: transparent;
            color: #aaa;
            border: 1px solid #555;
        }

        .btn-reset:hover {
            color: white;
            border-color: white;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #16213e;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #e94560;
            width: 0%;
            transition: width 0.5s ease;
        }

        .winner-section {
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .winner-card {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            margin: 20px 0;
            border: 2px solid #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        .winner-card img {
            width: 250px;
            height: 350px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .matchup-container {
                flex-direction: column;
                gap: 15px;
            }
            .vs {
                margin: 10px 0;
            }
            .anime-image {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Anime Tournament</h1>
            <p>Selecciona tu favorito para avanzar</p>
        </div>

        <div class="tournament-wrapper" id="mainWrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div id="tournamentUI">
                <div class="round-title" id="roundTitle">Cargando...</div>
                <div class="matchup-container" id="matchupContainer">
                    <!-- Aquí se insertan los animes por JS -->
                </div>
                <div class="button-group">
                    <button class="btn-next" id="nextBtn" disabled>Siguiente</button>
                    <button class="btn-reset" id="resetBtn">Reiniciar</button>
                </div>
            </div>

            <div id="winnerUI" class="winner-section" style="display: none;">
                <h2 style="color: gold; font-size: 2em; margin-bottom: 10px;">🏆 ¡EL GANADOR! 🏆</h2>
                <div class="winner-card">
                    <img id="winnerImage" src="" alt="Winner">
                    <h3 id="winnerName" style="font-size: 1.8em;"></h3>
                </div>
                <div class="button-group">
                    <button class="btn-next" id="playAgainBtn">Jugar de Nuevo</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const animeData = [
            {"title": "Re:Zero", "image": "https://pbs.twimg.com/media/GmYWczsaIAARMLj.jpg"},
            {"title": "The Eminence in Shadow", "image": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQf9P6dR4-WQWS2-468DRpOXni0m1nl9bdLZlU9-rVzwW8Yxc9M"},
            {"title": "Mushoku Tensei", "image": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnEkwozxVzMxNswipHwz78yeegcVnL7hbNec2StChjQF3l40yHZl5ZROO5&s=10"},
            {"title": "Chilling in Another World", "image": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSN8DEAjLiPNQLUTytngzdHpK1g-4VmgDKpZP4yGVfeksHxUeRRF1ti83kAw_66oQYvV5PB&s=10"},
            {"title": "Solo Leveling", "image": "https://m.media-amazon.com/images/M/MV5BOWM2NzcxZjEtYjFjNC00NzQwLTg4MzQtMDZjYzcwMTdmYmY4XkEyXkFqcGc@._V1_.jpg"},
            {"title": "Sword Art Online", "image": "https://m.media-amazon.com/images/M/MV5BN2NhYzU2NDEtYzI1NS00MjgzLThjZGUtOTYxNGJkZjZmNDdjXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "Overlord", "image": "https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcSNQDdFujhjJVDrqIVNUbj_jtyCG7dggPr96PjN2p4RPuJX0EzM"},
            {"title": "Konosuba", "image": "https://cdn.myanimelist.net/images/anime/8/77831.jpg"},
            {"title": "That Time I Got Slime", "image": "https://m.media-amazon.com/images/M/MV5BOTczMjM3MDUtYmZjMC00YzZhLWE4ODQtNjg5YWU4NTJjNzY2XkEyXkFqcGc@._V1_QL75_UX190_CR0,2,190,281_.jpg"},
            {"title": "Shield Hero", "image": "https://static.wikia.nocookie.net/dubbing9585/images/6/62/The_Rising_of_the_Shield_Hero_Season_4.jpg/revision/latest/scale-to-width/360?cb=20250714054521"},
            {"title": "Kaguya-sama", "image": "https://m.media-amazon.com/images/M/MV5BMTM1ZWViNWMtZWY2ZC00YmYyLTk1ZGEtMzRjOWI2YTM1OTI3XkEyXkFqcGc@._V1_.jpg"},
            {"title": "Horimiya", "image": "https://m.media-amazon.com/images/M/MV5BOGUzYmZkZjItNjI5Yi00NjllLThiMjUtYTY0MDI4M2Y0MmZlXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "My Dress-Up Darling", "image": "https://m.media-amazon.com/images/M/MV5BYmJhYjgzYTQtMzMxYi00NTkyLWI2MWItNTgxNjk1NzU0YmQzXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "Oregairu", "image": "https://img1.ak.crunchyroll.com/i/spire2/320673efcacdbdb0d6222156f8d797ce1476015938_full.jpg"},
            {"title": "Toradora!", "image": "https://mediaproxy.tvtropes.org/width/1200/https://static.tvtropes.org/pmwiki/pub/images/toradora.png"},
            {"title": "Jujutsu Kaisen", "image": "https://static.wikia.nocookie.net/jujutsu-kaisen/images/8/88/Anime_Key_Visual_2.png/revision/latest/scale-to-width-down/1200?cb=20201212034001"},
            {"title": "Demon Slayer", "image": "https://m.media-amazon.com/images/M/MV5BMWU1OGEwNmQtNGM3MS00YTYyLThmYmMtN2FjYzQzNzNmNTE0XkEyXkFqcGc@._V1_.jpg"},
            {"title": "Chainsaw Man", "image": "https://cdn.myanimelist.net/images/anime/1806/126216.jpg"},
            {"title": "My Hero Academia", "image": "https://cdn.myanimelist.net/images/anime/10/78745.jpg"},
            {"title": "Black Clover", "image": "https://m.media-amazon.com/images/M/MV5BZmZkZjNhMWMtM2U0Mi00MjdlLTk3NmMtMTMwZjgwOTJmODMzXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "Naruto", "image": "https://static.wikia.nocookie.net/voiceacting/images/e/e2/Naruto.JPG/revision/latest?cb=20211031034107"},
            {"title": "One Piece", "image": "https://m.media-amazon.com/images/M/MV5BMTNjNGU4NTUtYmVjMy00YjRiLTkxMWUtNzZkMDNiYjZhNmViXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "Dragon Ball Z", "image": "https://m.media-amazon.com/images/M/MV5BNmFiM2FkYTYtY2FiOS00ZWJkLTkyOTgtNmFmODI4NjcwNDgzXkEyXkFqcGc@._V1_.jpg"},
            {"title": "Bleach", "image": "https://m.media-amazon.com/images/M/MV5BMjgyM2QzMjAtOGZjOS00OGFkLTkxZGYtMDJjZGM5MzIzYmM3XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "Hunter x Hunter", "image": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2CcvT650jMhqbt2nOInCpi7WRYGvqnRWU-pfduHvHEE93SjzhzrJD6ik&s=10"},
            {"title": "Fullmetal Alchemist", "image": "https://cdn.myanimelist.net/images/anime/1223/96541.jpg"},
            {"title": "Death Note", "image": "https://cdn.myanimelist.net/images/anime/9/9453.jpg"},
            {"title": "Attack on Titan", "image": "https://m.media-amazon.com/images/M/MV5BZjliODY5MzQtMmViZC00MTZmLWFhMWMtMjMwM2I3OGY1MTRiXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"},
            {"title": "Spy x Family", "image": "https://cdn.myanimelist.net/images/anime/1441/122795.jpg"},
            {"title": "Frieren", "image": "https://m.media-amazon.com/images/M/MV5BZTI4ZGMxN2UtODlkYS00MTBjLWE1YzctYzc3NDViMGI0ZmJmXkEyXkFqcGc@._V1_.jpg"},
            {"title": "Oshi no Ko", "image": "https://cdn.myanimelist.net/images/anime/1812/134736.jpg"},
            {"title": "Steins;Gate", "image": "https://m.media-amazon.com/images/M/MV5BZjI1YjZiMDUtZTI3MC00YTA5LWIzMmMtZmQ0NTZiYWM4NTYwXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"}
        ];

        let currentRoundAnimes = [];
        let nextRoundAnimes = [];
        let selectedAnimeIndex = null;
        let totalMatches = 0;
        let completedMatches = 0;

        function initTournament() {
            currentRoundAnimes = [...animeData].sort(() => Math.random() - 0.5);
            nextRoundAnimes = [];
            completedMatches = 0;
            totalMatches = 31; // Para 32 animes son 31 enfrentamientos en total
            
            document.getElementById('tournamentUI').style.display = 'block';
            document.getElementById('winnerUI').style.display = 'none';
            
            showNextMatch();
        }

        function showNextMatch() {
            const container = document.getElementById('matchupContainer');
            const title = document.getElementById('roundTitle');
            const nextBtn = document.getElementById('nextBtn');
            
            selectedAnimeIndex = null;
            nextBtn.disabled = true;

            // Actualizar título de la ronda
            let rName = "RONDA DE 32";
            const len = currentRoundAnimes.length + nextRoundAnimes.length * 2;
            if (currentRoundAnimes.length <= 2 && nextRoundAnimes.length === 0) rName = "GRAN FINAL";
            else if (currentRoundAnimes.length <= 4) rName = "SEMIFINALES";
            else if (currentRoundAnimes.length <= 8) rName = "CUARTOS DE FINAL";
            else if (currentRoundAnimes.length <= 16) rName = "OCTAVOS DE FINAL";

            title.innerText = rName;

            // Obtener los dos siguientes
            const anime1 = currentRoundAnimes[0];
            const anime2 = currentRoundAnimes[1];

            container.innerHTML = `
                <div class="anime-card" id="card0" onclick="selectAnime(0)">
                    <img src="${anime1.image}" class="anime-image loading" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22350%22%3E%3Crect fill=%22%23333%22 width=%22300%22 height=%22350%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2218%22%3EImagen no disponible%3C/text%3E%3C/svg%3E'; this.classList.remove('loading');" onload="this.classList.remove('loading');">
                    <div class="anime-name">${anime1.title}</div>
                </div>
                <div class="vs">VS</div>
                <div class="anime-card" id="card1" onclick="selectAnime(1)">
                    <img src="${anime2.image}" class="anime-image loading" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22350%22%3E%3Crect fill=%22%23333%22 width=%22300%22 height=%22350%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2218%22%3EImagen no disponible%3C/text%3E%3C/svg%3E'; this.classList.remove('loading');" onload="this.classList.remove('loading');">
                    <div class="anime-name">${anime2.title}</div>
                </div>
            `;

            // Actualizar progreso
            const progress = (completedMatches / totalMatches) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        window.selectAnime = function(index) {
            selectedAnimeIndex = index;
            document.getElementById('card0').classList.remove('selected');
            document.getElementById('card1').classList.remove('selected');
            document.getElementById(`card${index}`).classList.add('selected');
            document.getElementById('nextBtn').disabled = false;
        };

        document.getElementById('nextBtn').onclick = function() {
            if (selectedAnimeIndex === null) return;

            // Guardar ganador
            const winner = currentRoundAnimes[selectedAnimeIndex];
            nextRoundAnimes.push(winner);

            // Eliminar los dos que pelearon
            currentRoundAnimes.splice(0, 2);
            completedMatches++;

            if (currentRoundAnimes.length === 0) {
                if (nextRoundAnimes.length === 1) {
                    showWinner(nextRoundAnimes[0]);
                } else {
                    // Siguiente ronda
                    currentRoundAnimes = nextRoundAnimes;
                    nextRoundAnimes = [];
                    showNextMatch();
                }
            } else {
                showNextMatch();
            }
        };

        function showWinner(winner) {
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('tournamentUI').style.display = 'none';
            document.getElementById('winnerUI').style.display = 'block';
            document.getElementById('winnerImage').src = winner.image;
            document.getElementById('winnerName').innerText = winner.title;
        }

        document.getElementById('resetBtn').onclick = initTournament;
        document.getElementById('playAgainBtn').onclick = initTournament;

        // Iniciar al cargar
        initTournament();
    </script>
</body>
</html>
